<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>暢悠樂 Plus | 會員分潤管理中心</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --dark-bg: #121212;
            --card-bg: #1e1e1e;
            --line-green: #06C755;
        }
        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Noto Sans TC', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container { width: 100%; max-width: 500px; }
        .user-profile { display: flex; align-items: center; margin-bottom: 25px; padding: 10px; }
        .user-avatar { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--gold); margin-right: 15px; background: #333; }
        .user-name { font-size: 1.2rem; font-weight: bold; }
        .balance-card { background: linear-gradient(135deg, #1e1e1e 0%, #333 100%); border: 1px solid var(--gold); border-radius: 20px; padding: 30px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 25px; width: 100%; }
        .balance-title { font-size: 0.9rem; color: #aaa; margin-bottom: 10px; letter-spacing: 1px; }
        .balance-amount { font-size: 2.5rem; font-weight: bold; color: var(--gold); }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; width: 100%; }
        .stat-box { background: var(--card-bg); padding: 20px; border-radius: 15px; text-align: center; border: 1px solid #333; }
        .stat-value { font-size: 1.4rem; font-weight: bold; color: #fff; }
        .stat-label { font-size: 0.8rem; color: #888; margin-top: 5px; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 50px; font-size: 1rem; font-weight: bold; margin-bottom: 15px; cursor: pointer; transition: 0.3s; text-decoration: none; display: block; text-align: center; }
        .btn-gold { background-color: var(--gold); color: #000; }
        .btn-outline { background: transparent; border: 1px solid var(--gold); color: var(--gold); }
        .history-section { background: var(--card-bg); border-radius: 15px; padding: 20px; width: 100%; }
        .history-title { font-weight: bold; margin-bottom: 15px; font-size: 1rem; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .history-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #2a2a2a; font-size: 0.9rem; }
        .footer-note { font-size: 0.7rem; color: #555; text-align: center; margin-top: 30px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="user-profile">
            <img src="" alt="" id="userAvatar" class="user-avatar">
            <div class="user-name" id="userName">驗證身分中...</div>
        </div>

        <div class="balance-card">
            <div class="balance-title">可提現分潤餘額 (TWD)</div>
            <div class="balance-amount" id="userBalance">$0</div>
        </div>

        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-value" id="inviteCount">0 人</div>
                <div class="stat-label">成功推薦人數</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="totalEarned">$0</div>
                <div class="stat-label">累計獲得獎金</div>
            </div>
        </div>

        <button class="btn btn-gold" onclick="requestWithdraw()">申請提現 (預約核銷)</button>
        <button class="btn btn-outline" onclick="shareReferral()">生成專屬推廣連結</button>

        <div class="history-section">
            <div class="history-title">最近活動紀錄</div>
            <div id="historyList">
                <div class="history-item">
                    <div style="color: #888;">尚未有紀錄，立即開始分享計畫！</div>
                </div>
            </div>
        </div>

        <div class="footer-note">
            © 2026 LAT Plus 瑞正生醫 | 系統版本 v1.0.2<br>
            所有分潤發放均需經過人工對帳審核
        </div>
    </div>

    <script>
        // 1. 初始化 LIFF
        async function main() {
            try {
                await liff.init({ liffId: "2009844406-JjOr1WN0" }); 
                if (liff.isLoggedIn()) {
                    getUserProfile();
                } else {
                    liff.login();
                }
            } catch (err) {
                console.error("LIFF 初始化失敗", err);
                document.getElementById("userName").innerText = "連線失敗";
            }
        }

        // 2. 抓取 LINE 資料
        async function getUserProfile() {
            try {
                const profile = await liff.getProfile();
                document.getElementById("userName").innerText = profile.displayName;
                document.getElementById("userAvatar").src = profile.pictureUrl;
                
                // --- 加入下面這一行來顯示你的 ID ---
                alert("你的 ID 是: " + profile.userId);
                // --------------------------------
                
                fetchUserBalance(profile.userId);
            } catch (err) {
                console.error("抓取個人資料失敗", err);
            }
        }
        // 3. 抓取餘額數據
        function fetchUserBalance(userId) {
            // 目前先用模擬數據，之後教你串 Google Sheets API
            console.log("當前使用者 ID:", userId);
            
            // 只要名字跑出來了，這下面的錢你可以隨便改來測試
            document.getElementById("userBalance").innerText = "$0"; 
            document.getElementById("inviteCount").innerText = "0 人";
            document.getElementById("totalEarned").innerText = "$0";
        }

        function requestWithdraw() {
            alert("提現功能申請中，請洽管理員。");
        }

        function shareReferral() {
            // 未來可以自動生成帶有邀請碼的連結
            alert("連結產生成功，請長按複製。");
        }

        main();
    </script>
</body>
</html>
